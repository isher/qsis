/* 全局重置+全屏基础样式 */

width:260px;

/* 公众号专栏板块（统一背景+全屏宽度） */

background: linear-gradient(to bottom, #6f1765 0%, 25%, #a567c9 100%);

}
/* 卡片容器全屏自适应 */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    /* 卡片间距 */
    justify-content: center;
    max-width: 1200px;
    /* 限制最大宽度，避免大屏拉伸 */
    margin: 0 auto;

}
/* 公众号卡片样式（增强背景+交互） */
.card {
    flex: 1;

    /* 轻微阴影增强层次 */
    transition: all 0.4s ease;
    /* 过渡更丝滑 */
    border: 1px solid #eee;
    /* 细边框增强质感 */
}
/* 卡片hover交互（按键按下效果） */
.card:hover {
    transform: translateY(-8px) scale(1.02);
    /* 上移+轻微放大 */
    box-shadow: 1px 10px rgba(0,0,0,0.1);
    /* 阴影加深 */
    background: #af63cf;
    /* hover轻微变色 */
    border-color: #e0e0e0;
}

.card:hover p,.card:hover a {
    color: #ffffff;

    width: 100%;
    height: 100%;
